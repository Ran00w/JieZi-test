backend: vllm_managed
manage_server: true
prompt_name: simple
base_url: http://127.0.0.1:9988/v1
model: Qwen3.5-4B
model_path: ""  # e.g. /path/to/Qwen3.5-4B
python_exec: null
vllm_exec: vllm
api_key_env: null
timeout: 120
max_retries: 1
retry_backoff_base: 2.0
retry_backoff_max: 20.0
host: 127.0.0.1
port: 9988
cuda_visible_devices: 0,1
tensor_parallel_size: 1
pipeline_parallel_size: 2
dtype: auto
gpu_memory_utilization: 0.92
max_model_len: 1024
max_num_seqs: 64
trust_remote_code: true
limit_mm_per_prompt: '{"image":1}'
extra_args: []
startup_timeout: 600
